<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍕 Pizza Tournament Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1 id="tournament-title">🍕 Pizza Tournament</h1>
    <p id="tournament-subtitle" class="subtitle">16-Pizza Single-Elimination Bracket</p>

    <div class="layout-toggle" role="group" aria-label="Bracket layout">
      <span class="layout-toggle-label">Layout</span>
      <button type="button" data-layout="classic" aria-pressed="true">Classic</button>
      <button type="button" data-layout="split" aria-pressed="false">Split</button>
    </div>
  </header>

  <main>
    <div class="bracket-scroll">
      <div class="bracket" id="bracket">
        <!-- Rounds are generated by js/bracket.js -->
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Update matches in <code>js/data.js</code>. Winners auto-advance to the next round.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/bracket.js"></script>
</body>
</html>
